# Evergreen Quote — provided CI workflow.
# Capstone learners: enable this by copying it to .github/workflows/ci.yml
# in your repo and pushing. Do not modify the workflow itself.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    name: Validate site
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate HTML (html-validate)
        run: npx --yes html-validate "**/*.html" || true

      - name: Smoke-check required files
        run: |
          test -f index.html
          test -f css/theme.css
          test -f js/quote-calc.js
          echo "All required files present."

      - name: Lint JS syntax
        run: node --check js/quote-calc.js
