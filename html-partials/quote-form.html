<!-- CONFIG: add bootstrap class here (outer section): container py-4 -->
<section class="quote-form-section">
  <div class="card shadow-sm">
    <div class="card-body">
      <h2 class="card-title">Get Your Quote</h2>

      <!-- CONFIG: add bootstrap class here (form): row g-3 -->
      <form id="quote-form" class="quote-form">
        <div class="col-md-6">
          <label for="fullName" class="form-label">Full Name</label>
          <input type="text" id="fullName" class="form-control" placeholder="Jane Doe" required />
        </div>

        <div class="col-md-3">
          <label for="zip" class="form-label">ZIP Code</label>
          <input type="text" id="zip" class="form-control" placeholder="02101" maxlength="5" required />
        </div>

        <div class="col-md-3">
          <label for="coverageType" class="form-label">Coverage Type</label>
          <select id="coverageType" class="form-select" required>
            <option value="">Select coverage</option>
            <option value="auto">Auto</option>
            <option value="home">Home</option>
            <option value="renters">Renters</option>
          </select>
        </div>

        <div class="col-12">
          <label for="coverageAmount" class="form-label">
            Coverage Amount: $<span id="coverageAmountDisplay">50000</span>
          </label>
          <input
            type="range"
            id="coverageAmount"
            class="form-range"
            min="10000"
            max="500000"
            step="10000"
            value="50000"
          />
        </div>

        <div class="col-12">
          <button type="submit" class="btn btn-success">Calculate Premium</button>
        </div>
      </form>

      <div id="premium-box" class="premium-box mt-4" hidden>
        <div class="premium-label text-muted">Estimated Monthly Premium</div>
        <div class="premium-value display-6 fw-bold" id="premium-value">$0</div>
      </div>
    </div>
  </div>
</section>
